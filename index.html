<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ideOS+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Pyodide for Python -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

  <!-- Xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.5.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>

  <!-- WebAssembly.sh Clang (Option B) -->
  <script src="https://webassembly.sh/clang/16/clang.js"></script>

  <style>
    :root {
      --accent: #4caf50;
      --ai-purple: #bb86fc;
      --save-blue: #00bcd4;
      --clear-red: #ff5252;
      --bg: #0b0b0b;
      --bg-deep: #000000;
      --fg: #ffffff;
      --terminal-bg: #000000;
      --terminal-fg: #e0ffe0;
    }

    body {
      margin: 0;
      background: var(--bg);
      font-family: 'SF Mono', monospace;
      color: var(--fg);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header / toolbar (kept visible) */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #111;
      border-bottom: 1px solid #222;
    }

    #project-name {
      background: #000;
      border: 1px solid #333;
      color: var(--save-blue);
      font-size: 11px;
      padding: 5px;
      outline: none;
      width: 140px;
    }

    .tab {
      color: #666;
      font-size: 11px;
      cursor: pointer;
      padding: 6px 10px;
      border: 1px solid transparent;
      text-transform: uppercase;
    }

    .tab.active {
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    button {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
    }

    #status-light {
      width: 10px;
      height: 10px;
      background: var(--clear-red);
      border-radius: 50%;
      box-shadow: 0 0 5px var(--clear-red);
      margin-right: 6px;
    }

    /* Main layout: keep “editor + right side” feel */
    #main {
      flex: 1;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      grid-template-rows: 100%;
      background: var(--bg-deep);
    }

    #editor-panel {
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    #editor {
      flex: 1;
      background: #0b0b0b;
      color: #d4d4d4;
      border: none;
      padding: 20px;
      font-size: 16px;
      outline: none;
      resize: none;
      line-height: 1.5;
      tab-size: 4;
      white-space: pre;
      font-family: 'SF Mono', monospace;
    }

    #editor.error {
      border: 1px solid #ff4444;
      box-shadow: 0 0 8px #ff4444;
    }

    #right-panel {
      display: flex;
      flex-direction: column;
      background: #050505;
    }

    /* HTML preview area (top of right panel) */
    #preview-frame {
      flex: 1;
      border: none;
      background: #111;
    }

    /* Terminal area (bottom of right panel) */
    #terminal-wrapper {
      height: 40%;
      border-top: 1px solid #222;
      background: var(--terminal-bg);
      display: flex;
      flex-direction: column;
    }

    #terminal-header {
      font-size: 11px;
      padding: 4px 8px;
      border-bottom: 1px solid #222;
      color: #888;
      text-transform: uppercase;
    }

    #terminal-container {
      flex: 1;
      padding: 4px;
      box-sizing: border-box;
    }

    .xterm {
      font-family: 'SF Mono', monospace;
      font-size: 13px;
    }

    /* Autocomplete bubble (kept) */
    #autocomplete-box {
      position: absolute;
      background: rgba(0, 255, 0, 0.12);
      border: 1px solid #00ff88;
      color: #00ff88;
      padding: 6px 10px;
      font-size: 12px;
      font-family: monospace;
      border-radius: 6px;
      pointer-events: none;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 12px #00ff88;
      display: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <div id="status-light"></div>

    <input
      type="text"
      id="project-name"
      value="my_project"
      title="Enter filename here"
    />

    <div id="html-tab" class="tab active" onclick="setMode('HTML')">HTML</div>
    <div id="python-tab" class="tab" onclick="setMode('Python')">Python</div>
    <div id="cpp-tab" class="tab" onclick="setMode('Cpp')">C++</div>
    <div id="linux-tab" class="tab" onclick="setMode('Linux')">Linux</div>

    <div style="flex:1"></div>

    <button onclick="runCurrent()">Run</button>
    <button onclick="newFile()">New File</button>
    <button onclick="clearConsole()">Clear Console</button>
    <button onclick="downloadCode()">Download Code</button>
  </div>

  <!-- Main layout: editor + right side (preview + terminal) -->
  <div id="main">
    <div id="editor-panel">
      <textarea id="editor" spellcheck="true"></textarea>
      <div id="autocomplete-box"></div>
    </div>

    <div id="right-panel">
      <iframe id="preview-frame"></iframe>
      <div id="terminal-wrapper">
        <div id="terminal-header">Terminal</div>
        <div id="terminal-container"></div>
      </div>
    </div>
  </div>

  <script>
    let mode = 'HTML';
    let pyodide;
    let term, fitAddon;

    // stdin handling for terminal
    const inputBuffer = [];
    let waitingForInputResolve = null;

    function initTerminal() {
      term = new Terminal({
        theme: {
          background: '#000000',
          foreground: '#e0ffe0',
          cursor: '#4caf50',
        },
        cursorBlink: true,
        fontFamily: 'SF Mono, monospace',
      });
      fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      term.writeln('ideOS+ terminal ready.');
      term.writeln('');

      term.onData((data) => {
        if (data === '\r') {
          term.write('\r\n');
          const line = inputBuffer.join('');
          inputBuffer.length = 0;
          if (waitingForInputResolve) {
            const resolve = waitingForInputResolve;
            waitingForInputResolve = null;
            resolve(line);
          }
        } else if (data === '\u007F') {
          if (inputBuffer.length > 0) {
            inputBuffer.pop();
            term.write('\b \b');
          }
        } else {
          inputBuffer.push(data);
          term.write(data);
        }
      });

      window.addEventListener('resize', () => fitAddon.fit());
    }

    async function initPyodide() {
      pyodide = await loadPyodide();
    }

    function setMode(m) {
      mode = m;
      document.querySelectorAll('.tab').forEach((t) =>
        t.classList.remove('active')
      );
      document.getElementById(m.toLowerCase() + '-tab').classList.add('active');

      // For HTML mode, show preview; for others, preview is just idle
      if (mode === 'HTML') {
        document.getElementById('preview-frame').style.display = 'block';
      } else {
        document.getElementById('preview-frame').style.display = 'none';
      }

      checkErrors();
    }

    function newFile() {
      if (confirm('Clear editor?')) {
        document.getElementById('editor').value = '';
        checkErrors();
      }
    }

    function clearConsole() {
      term.clear();
      term.writeln('ideOS+ terminal cleared.');
      term.writeln('');
    }

    function downloadCode() {
      const name = document.getElementById('project-name').value || 'my_project';
      const ext =
        mode === 'Python'
          ? '.py'
          : mode === 'HTML'
          ? '.html'
          : mode === 'Cpp'
          ? '.cpp'
          : '.txt';
      const blob = new Blob([document.getElementById('editor').value], {
        type: 'text/plain',
      });
      const a = document.createElement('a');
      a.download = name + ext;
      a.href = window.URL.createObjectURL(blob);
      a.click();
    }

    function setStatusRunning(running) {
      const light = document.getElementById('status-light');
      if (running) {
        light.style.background = '#4caf50';
        light.style.boxShadow = '0 0 10px #4caf50';
      } else {
        light.style.background = '#ff5252';
        light.style.boxShadow = '0 0 5px #ff5252';
      }
    }

    async function runCurrent() {
      const code = document.getElementById('editor').value;
      clearConsole();
      setStatusRunning(true);

      try {
        if (mode === 'HTML') {
          runHTML(code);
        } else if (mode === 'Python') {
          await runPython(code);
        } else if (mode === 'Cpp') {
          await runCpp(code);
        } else if (mode === 'Linux') {
          runLinux(code);
        }
      } catch (e) {
        term.writeln('');
        term.writeln('[ERROR] ' + e);
      } finally {
        setStatusRunning(false);
      }
    }

    // ---------- HTML ----------
    function runHTML(code) {
      const iframe = document.getElementById('preview-frame');
      iframe.style.display = 'block';
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(code);
      doc.close();
      term.writeln('[HTML] Rendered in preview frame.');
    }

    // ---------- Python with interactive input() ----------
    async function runPython(code) {
      if (!pyodide) await initPyodide();

      term.writeln('[Python] Running...');
      term.writeln('');

      pyodide.globals.set(
        'js_input',
        pyodide.toPy(async function prompt_line(promptText) {
          if (promptText) {
            term.write(promptText);
          }
          const line = await new Promise((resolve) => {
            waitingForInputResolve = resolve;
          });
          return line;
        })
      );

      const wrapped = `
import sys, io, builtins
from js import js_input

_stdout = io.StringIO()
_stderr = io.StringIO()
sys.stdout = _stdout
sys.stderr = _stderr

async def __run():
    builtins.input = js_input
    ${code.replace(/\r\n/g, '\n')}

await __run()
_stdout.getvalue(), _stderr.getvalue()
      `;

      try {
        const [out, err] = await pyodide.runPythonAsync(wrapped);
        if (out) term.writeln(out);
        if (err) term.writeln(err);
      } catch (e) {
        term.writeln('[Python error] ' + e);
      }
    }

    // ---------- C++ via WebAssembly.sh Clang ----------
    async function runCpp(code) {
      term.writeln('[C++] Compiling with WebAssembly.sh Clang...');
      term.writeln('');

      // WebAssembly.sh exposes a global "Module" for clang
      // We use its virtual FS and callMain to compile & run.
      // 1. Write source to virtual FS
      const sourceName = 'main.cpp';
      const outName = 'a.wasm';

      Module.FS.writeFile(sourceName, code);

      // 2. Compile: clang main.cpp -O2 -o a.wasm --target=wasm32-wasi
      const args = [
        'clang',
        sourceName,
        '-O2',
        '--target=wasm32-wasi',
        '-nostartfiles',
        '-Wl,--export=main',
        '-o',
        outName,
      ];

      term.writeln('$ ' + args.join(' '));

      const clangExit = Module.callMain(args);
      if (clangExit !== 0) {
        term.writeln('[C++] clang failed with exit code ' + clangExit);
        return;
      }

      term.writeln('[C++] Compilation successful, running...\n');

      // 3. Load and run the produced WASM with WASI-like stdin/stdout
      const wasmBytes = Module.FS.readFile(outName);
      const wasmModule = await WebAssembly.compile(wasmBytes);

      const wasiStdin = {
        read: async () => {
          const line = await new Promise((resolve) => {
            waitingForInputResolve = resolve;
          });
          return line + '\n';
        },
      };

      let stdoutBuffer = '';

      const wasiImports = {
        wasi_snapshot_preview1: {
          fd_write: (fd, iov, iovcnt, pOut) => {
            const mem = new DataView(wasmInstance.exports.memory.buffer);
            let written = 0;
            for (let i = 0; i < iovcnt; i++) {
              const ptr = mem.getUint32(iov + i * 8, true);
              const len = mem.getUint32(iov + i * 8 + 4, true);
              const bytes = new Uint8Array(
                wasmInstance.exports.memory.buffer,
                ptr,
                len
              );
              const text = new TextDecoder().decode(bytes);
              stdoutBuffer += text;
              written += len;
            }
            term.write(stdoutBuffer);
            stdoutBuffer = '';
            mem.setUint32(pOut, written, true);
            return 0;
          },
          fd_read: async (fd, iov, iovcnt, pOut) => {
            const mem = new DataView(wasmInstance.exports.memory.buffer);
            const line = await wasiStdin.read();
            const bytes = new TextEncoder().encode(line);
            const ptr = mem.getUint32(iov, true);
            const len = Math.min(bytes.length, mem.getUint32(iov + 4, true));
            new Uint8Array(wasmInstance.exports.memory.buffer, ptr, len).set(
              bytes.subarray(0, len)
            );
            mem.setUint32(pOut, len, true);
            return 0;
          },
          fd_close: () => 0,
          fd_seek: () => 0,
          fd_fdstat_get: () => 0,
          proc_exit: (code) => {
            term.writeln('\n[Process exited with code ' + code + ']');
          },
        },
      };

      const wasmInstance = await WebAssembly.instantiate(wasmModule, wasiImports);
      if (wasmInstance.exports._start) {
        wasmInstance.exports._start();
      } else if (wasmInstance.exports.main) {
        wasmInstance.exports.main();
      } else {
        term.writeln('[C++] No entry point found.');
      }
    }

    // ---------- Linux tab ----------
    function runLinux(code) {
      term.writeln('[Linux] This tab uses the same terminal.');
      term.writeln('You can paste shell-like commands or notes here.');
      term.writeln('');
      if (code.trim()) {
        term.writeln(code);
      }
    }

    // ---------- Autocomplete + error checking (kept, trimmed) ----------
    const editor = document.getElementById('editor');
    const acBox = document.getElementById('autocomplete-box');
    const acSuggestions = {
      Python: ['print()', 'def ', 'class ', 'import ', 'return ', 'for ', 'while '],
      HTML: ['<div>', '<span>', '<script>', '<style>', '<p>', '<a>', '<ul>', '<li>'],
      Cpp: ['int ', 'std::cout << ', 'std::string ', 'return ', 'class ', 'for ', 'while ', 'if '],
      Linux: ['echo ', 'ls', 'cd ', 'cat ', 'touch ', 'mkdir '],
    };

    let acMatches = [];
    let acIndex = 0;

    function getCaretCoordinates() {
      const rect = editor.getBoundingClientRect();
      const start = editor.selectionStart;
      const text = editor.value.substring(0, start);
      const span = document.createElement('span');
      span.style.visibility = 'hidden';
      span.style.whiteSpace = 'pre-wrap';
      span.style.font = window.getComputedStyle(editor).font;
      span.textContent = text.replace(/\n/g, '\n');
      document.body.appendChild(span);
      const coords = span.getBoundingClientRect();
      document.body.removeChild(span);
      return { x: coords.left - rect.left, y: coords.top - rect.top };
    }

    function showAutocomplete(suggestion) {
      const pos = getCaretCoordinates();
      acBox.style.left = pos.x + 'px';
      acBox.style.top = pos.y + 20 + 'px';
      acBox.textContent = suggestion;
      acBox.style.display = 'block';
    }

    function hideAutocomplete() {
      acBox.style.display = 'none';
      acMatches = [];
      acIndex = 0;
    }

    function checkErrors() {
      const text = editor.value;
      let error = false;

      const stack = [];
      const pairs = { ')': '(', ']': '[', '}': '{' };
      for (let ch of text) {
        if (ch === '(' || ch === '[' || ch === '{') stack.push(ch);
        if (ch === ')' || ch === ']' || ch === '}') {
          if (stack.pop() !== pairs[ch]) {
            error = true;
            break;
          }
        }
      }
      if (!error && stack.length > 0) error = true;

      if (!error && mode === 'HTML') {
        const tagStack = [];
        const tagRegex = /<\/?([a-zA-Z0-9]+)[^>]*>/g;
        let m;
        while ((m = tagRegex.exec(text)) !== null) {
          const full = m[0];
          const name = m[1];
          if (full.startsWith('</')) {
            if (tagStack.pop() !== name) {
              error = true;
              break;
            }
          } else if (!full.endsWith('/>')) {
            tagStack.push(name);
          }
        }
        if (!error && tagStack.length > 0) error = true;
      }

      if (error) editor.classList.add('error');
      else editor.classList.remove('error');
    }

    editor.addEventListener('input', () => {
      const text = editor.value;
      const cursorPos = editor.selectionStart;
      const before = text.substring(0, cursorPos);
      const match = before.match(/[\w<>!]+$/);
      if (!match) {
        hideAutocomplete();
        checkErrors();
        return;
      }
      const currentWord = match[0];
      const list = acSuggestions[mode] || [];
      acMatches = list.filter((s) => s.startsWith(currentWord));
      acIndex = 0;
      if (acMatches.length === 0) {
        hideAutocomplete();
      } else {
        showAutocomplete(acMatches[0]);
      }
      checkErrors();
    });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab' && acBox.style.display === 'block') {
        e.preventDefault();
        if (e.shiftKey) {
          acIndex = (acIndex - 1 + acMatches.length) % acMatches.length;
          showAutocomplete(acMatches[acIndex]);
          return;
        }
        if (acMatches.length > 1) {
          acIndex = (acIndex + 1) % acMatches.length;
          showAutocomplete(acMatches[acIndex]);
          return;
        }
      }

      if (e.key === 'Enter' && acBox.style.display === 'block') {
        e.preventDefault();
        const suggestion = acMatches[acIndex];
        const cursorPos = editor.selectionStart;
        const text = editor.value;
        const before = text.substring(0, cursorPos);
        const after = text.substring(cursorPos);
        const match = before.match(/[\w<>!]+$/);
        if (!match) return;
        const start = match.index;
        const newText = before.substring(0, start) + suggestion + after;
        editor.value = newText;
        const parenIndex = suggestion.indexOf('(');
        if (parenIndex !== -1 && suggestion.endsWith(')')) {
          editor.selectionStart = editor.selectionEnd = start + parenIndex + 1;
        } else {
          editor.selectionStart = editor.selectionEnd = start + suggestion.length;
        }
        hideAutocomplete();
        checkErrors();
        return;
      }

      if (e.key === 'Enter' && acBox.style.display !== 'block') {
        e.preventDefault();
        const cursorPos = editor.selectionStart;
        const text = editor.value;
        const before = text.substring(0, cursorPos);
        const after = text.substring(cursorPos);
        const lineStart = before.lastIndexOf('\n') + 1;
        const currentLine = before.substring(lineStart);
        const indentMatch = currentLine.match(/^\s*/);
        let indent = indentMatch ? indentMatch[0] : '';
        const trimmed = currentLine.trimEnd();
        if (/[{:]$/.test(trimmed)) {
          indent += ' ';
        }
        const insert = '\n' + indent;
        editor.value = before + insert + after;
        editor.selectionStart = editor.selectionEnd = cursorPos + insert.length;
        checkErrors();
        return;
      }
    });

    // Init
    window.addEventListener('load', () => {
      initTerminal();
      initPyodide();
      document.getElementById('preview-frame').style.display = 'block';
    });
  </script>
</body>
</html>
